name: Deploy Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM bundles (scalar + simd)
        run: ./scripts/build-browser-bundles.sh

      - name: Verify SIMD instruction content before deploying
        run: SKIP_BUILD=1 ./scripts/verify-wasm-simd.sh

      - name: Prepare Deployment
        run: |
          mkdir -p public
          cp -r pkg public/
          cp -r docs/browser public/browser
          find public -name ".gitignore" -delete
          cat > public/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Barq-WASM</title></head>
          <body>
            <h1>Barq-WASM</h1>
            <p>The previous live benchmark page has been retired: its comparisons
            were not reproducible and some function names overstated the
            implementation (scalar code labeled SIMD).</p>
            <p>Reproducible browser benchmarks with verified correctness and
            recorded methodology will be published here once implemented. Until
            then, see the repository for the current
            <a href="https://github.com/YASSERRMD/barq-wasm/blob/main/implementation-status.json">implementation status</a>.</p>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
